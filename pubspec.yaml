name: flutteradvisor
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'   # range syntax required by pub — ^ is not valid here

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0             # latest stable; ^1.6.0 does not exist yet
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0   # ^6.0.0 does not exist; latest stable is 4.x
  flutter_launcher_icons: ^0.13.1  # correct package name (was flutter_dynamic_launcher_icon)

# ── Launcher icon config (read by flutter_launcher_icons) ────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/finance_logo.png"

# ── Flutter section ───────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/finance_logo.png   # required so the logo file is bundled

  # fonts:
  #   - family: Courier
  #     fonts:
  #       - asset: fonts/Courier.ttf